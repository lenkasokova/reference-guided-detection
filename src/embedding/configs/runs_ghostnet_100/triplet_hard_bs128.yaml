seed: 42
output_dir: "./runs/ghostnet_100/triplet_hard_bs128"

data:
  train_dir: "./plantnet/train"
  val_dir: "./plantnet/val"
  test_dir: "./plantnet/test"
  image_size: 224
  num_workers: 8

train:
  epochs: 50
  batch_size: 128
  lr: 0.0003
  weight_decay: 0.0001
  embedding_dim: 128
  backbone: "ghostnet_100"
  pretrained: true
  freeze_backbone: false
  scheduler: "cosine"
  mixed_precision: true
  grad_clip: 1.0

loss:
  name: "triplet"
  temperature: 0.07
  margin: 0.4
  miner: "hard"
  alpha: 32

sampling:
  samples_per_class: 8

logging:
  save_csv: true
  save_json: true
  save_plots: true
  save_confusion_like_retrieval: false
  tensorboard: true
  log_every: 20

evaluation:
  k_values: [1, 3, 5]
  normalize_embeddings: true
  run_val_retrieval: true

early_stopping:
  enabled: true
  patience: 10
  monitor: "val_top1"
