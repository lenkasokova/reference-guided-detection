seed: 42
output_dir: "./runs/lite4/proxy_anchor_m01_a32"

data:
  train_dir: "./plantnet/train"
  val_dir: "./plantnet/val"
  test_dir: "./plantnet/test"
  image_size: 224
  num_workers: 8

train:
  epochs: 50
  batch_size: 64
  lr: 0.0003
  weight_decay: 0.0001
  embedding_dim: 128
  backbone: "efficientnet_lite4"
  pretrained: true
  freeze_backbone: false
  scheduler: "cosine"
  mixed_precision: true
  grad_clip: 1.0

loss:
  name: "proxy_anchor"
  temperature: 0.07
  margin: 0.1            # angular margin delta
  miner: "semi_hard"
  alpha: 32              # logit scale

sampling:
  samples_per_class: 4

logging:
  save_csv: true
  save_json: true
  save_plots: true
  save_confusion_like_retrieval: false
  tensorboard: true
  log_every: 20

evaluation:
  k_values: [1, 3, 5]
  normalize_embeddings: true
  run_val_retrieval: true

early_stopping:
  enabled: true
  patience: 10
  monitor: "val_top1"
